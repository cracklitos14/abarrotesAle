<div class="contenedor-reportes">

  <h2>Reportes</h2>

  <div class="filtros">

    <label>Desde</label>
    <input type="date" [(ngModel)]="fechaInicio" [max]="hoy">

    <label>Hasta</label>
    <input type="date" [(ngModel)]="fechaFin" [max]="hoy">

    <button
      class="btn-filtrar"
      (click)="generarReporte()"
      [disabled]="cargando">

      {{ cargando ? 'Generando...' : 'Generar Reporte' }}

    </button>

  </div>

  <!-- EXPORTAR (SE DEJA IGUAL) -->
  <div class="exportar">

    <button
      class="btn-exportar"
      (click)="exportarReporteCSV()">
      Exportar CSV
    </button>

    <button
      class="btn-exportar pdf"
      (click)="exportarReportePDF()">
      Exportar PDF
    </button>

  </div>

  <!-- ALERTA FLOTANTE -->
  <div class="alerta" *ngIf="mostrarAlerta">
    ✅ Reporte generado correctamente
  </div>

</div>
