<div class="contenedor-reportes">

<h2>Reportes</h2>

<div class="filtros">

<label>Desde</label>

<input
type="date"
[(ngModel)]="fechaInicio"
[max]="hoy">

<label>Hasta</label>

<input
type="date"
[(ngModel)]="fechaFin"
[max]="hoy">

<button
class="btn-filtrar"
(click)="loadReportesPorFechas()"
[disabled]="cargando">

{{ cargando ? 'Generando...' : 'Generar Reporte' }}

</button>

</div>


<div class="resumen">

<div class="card">

<h3>Ingresos Totales</h3>

<p class="valor">

{{ reportes.ingresosTotales | currency:'MXN' }}

</p>

</div>


<div class="card">

<h3>Alertas Inventario</h3>

<p *ngIf="reportes.mensajeAlertas">
{{reportes.mensajeAlertas}}
</p>

<ul *ngIf="reportes.productosStockBajo.length>0">

<li *ngFor="let prod of reportes.productosStockBajo">

{{prod.nombre}} - Stock {{prod.stock}}

</li>

</ul>

</div>

</div>


<div class="tabla">

<h3>Productos Vendidos</h3>

<table *ngIf="reportes.productosVendidos.length>0">

<thead>

<tr>

<th>Producto</th>
<th>Unidades</th>
<th>Ingresos</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let prod of reportes.productosVendidos">

<td>{{prod.nombre}}</td>
<td>{{prod.unidades}}</td>
<td>{{prod.ingresos | currency:'MXN'}}</td>

</tr>

</tbody>

</table>

</div>


<div class="exportar">

<button
class="btn-exportar"
(click)="exportarReporteCSV()">

Exportar CSV

</button>

<button
class="btn-exportar pdf"
(click)="exportarReportePDF()">

Exportar PDF

</button>

</div>

</div>
