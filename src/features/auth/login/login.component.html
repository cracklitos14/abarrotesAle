
<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Usuario</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
        />
      </div>

      <button type="submit">
        Entrar
      </button>

    </form>
  </div>
</div>
